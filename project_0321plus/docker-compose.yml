services:
  video-processor:
    build: ./video-processor
    container_name: video-processor
    cpuset: "2"                   # 绑定 CPU 核心 2
    mem_limit: 256m               # 内存限制 256MB
    devices:
      - "/dev/video0:/dev/video0" # 映射摄像头
    environment:
      CAMERA_DEVICE: /dev/video0
      CAMERA_WIDTH: "1280"
      CAMERA_HEIGHT: "720"
      CAMERA_FPS: "10"
      CAMERA_SHARPNESS: "4"
    volumes:
      - v_shm:/dev/shm            # 共享内存卷
    restart: always
    stop_signal: SIGINT

  webrtc-gateway:
    build: ./webrtc-gateway
    container_name: webrtc-gateway
    cpuset: "3"                   # 绑定 CPU 核心 3
    mem_limit: 512m               # 内存限制 512MB
    network_mode: host            # WebRTC 需主机网络
    volumes:
      - v_shm:/dev/shm
    depends_on:
      - video-processor
    restart: always

volumes:
  v_shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=128m"              # 共享内存 128MB
